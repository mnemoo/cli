        team: { type: string }
        game: { type: string }
        path: { type: string }
        etag: { type: string, nullable: true }
        size:
          type: number
          description: Must be at most ChunkSize (100 MiB in client)

    FilePart:
      type: object
      required: [etag, number, size]
      properties:
        etag: { type: string, minLength: 1 }
        number: { type: integer, minimum: 0 }
        size: { type: number, exclusiveMinimum: 0 }

    FileMultiUploadBody:
      type: object
      required: [filename, team, game, path, size, parts]
      properties:
        filename: { type: string, minLength: 1 }
        team: { type: string }
        game: { type: string }
        path: { type: string, minLength: 1 }
        size:
          type: number
          description: Must be greater than ChunkSize
        parts:
          type: array
          items:
            $ref: "#/components/schemas/FilePart"
          minItems: 1

    FileMulticopyBody:
      type: object
      required: [team, game, pathTo, pathFrom, etag, size, parts]
