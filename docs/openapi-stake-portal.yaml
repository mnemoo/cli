openapi: 3.1.0
info:
  title: Stake Portal / Engine Web API
  description: |
    Contract
  version: "1.0.0"

servers:
  - url: https://stake-engine.com/

tags:
  - name: auth
  - name: users
  - name: teams
  - name: invites
  - name: operators
  - name: games
  - name: approvals
  - name: guidelines
  - name: admin
  - name: contracts
  - name: files
  - name: assets
  - name: rankings
  - name: payments

paths:
  /api/users:
    get:
      tags: [users]
      summary: Current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /api/users/accounts:
    get:
      tags: [users]
      summary: Linked OAuth accounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAccountsResponse"

  /auth/revoke/discord/{providerAccountID}:
    post:
      tags: [auth]
      parameters:
        - $ref: "#/components/parameters/ProviderAccountID"
      responses:
        "200":
          description: null or void (client union)
          content:
            application/json:
              schema:
                nullable: true

  /auth/revoke/google/{providerAccountID}:
    post:
      tags: [auth]
      parameters:
        - $ref: "#/components/parameters/ProviderAccountID"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /auth/revoke/github/{providerAccountID}:
    post:
      tags: [auth]
      parameters:
        - $ref: "#/components/parameters/ProviderAccountID"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams:
    get:
      tags: [teams]
      summary: List teams (filtered)
      parameters:
        - name: name
          in: query
          schema: { type: string }
        - name: size
          in: query
          schema: { type: number }
        - name: from
          in: query
          schema: { type: number }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamListItem"

  /api/teams/{team}:
    parameters:
      - $ref: "#/components/parameters/TeamSlug"
    get:
      tags: [teams]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"
    patch:
      tags: [teams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamPatchBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"

  /api/teams/{team}/balance:
    get:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  position: { type: number }
                  carry: { type: number }

  /api/teams/{team}/stats:
    get:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: operator
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string }
        - name: end
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamGameStatRow"

  /api/teams/{team}/teamStats:
    get:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: operator
          in: query
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string }
        - name: end
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamOperatorStatRow"

  /api/teams/{team}/games/{game}/stats:
    get:
      tags: [games, teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
        - name: operator
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
        - name: start
          in: query
          schema: { type: string }
        - name: end
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStatsByModeResponse"

  /api/teams/{team}/locationStats:
    get:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: operator
          in: query
          schema:
            type: array
            items: { type: string }
        - name: start
          in: query
          schema: { type: number }
        - name: end
          in: query
          schema: { type: number }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationStatsResponse"

  /api/teams/{team}/invites:
    get:
      tags: [invites]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InviteStatus"
          nullable: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInvite"
    post:
      tags: [invites]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:
                  type: array
                  items: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamInvite"

  /api/teams/{team}/wallets:
    get:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletRecord"
    post:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [walletAddr, teamAddr, walletType]
              properties:
                walletAddr: { type: string }
                teamAddr: { type: string }
                walletType: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletRecord"

  /api/teams/{team}/wallets/{walletId}:
    delete:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: walletId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletRecord"

  /api/invites:
    get:
      tags: [invites]
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InviteStatus"
          nullable: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInvite"

  /api/invites/{inviteID}/accept:
    post:
      tags: [invites]
      parameters:
        - name: inviteID
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteActionResponse"

  /api/invites/{inviteID}/decline:
    post:
      tags: [invites]
      parameters:
        - name: inviteID
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteActionResponse"

  /api/invites/{inviteID}:
    delete:
      tags: [invites]
      parameters:
        - name: inviteID
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteActionResponse"

  /api/operators:
    get:
      tags: [operators]
      parameters:
        - name: demo
          in: query
          schema: { type: boolean }
        - name: active
          in: query
          schema: { type: boolean }
        - name: social
          in: query
          schema: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Operator"

  /api/teams/{team}/games:
    get:
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: published
          in: query
          schema: { type: string }
        - name: has_approval
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamGameCard"
    post:
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameCreateResponse"

  /api/teams/{team}/games/{game}:
    parameters:
      - $ref: "#/components/parameters/TeamSlug"
      - $ref: "#/components/parameters/GameSlug"
    get:
      tags: [games]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamGameDetail"
    patch:
      tags: [games]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, nullable: true }
                slug: { type: string, nullable: true }
                image: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamGameDetail"
    delete:
      tags: [games]
      responses:
        "200":
          description: OK

  /api/teams/{team}/games/{game}/versions:
    get:
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/VersionKind"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameVersionHistoryItem"

  /api/teams/{team}/users:
    get:
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /api/teams/{team}/users/{userID}:
    parameters:
      - $ref: "#/components/parameters/TeamSlug"
      - name: userID
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [teams]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: array
                  items: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      tags: [teams]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  email: { type: string }
                  name: { type: string }
                  image: { type: string, nullable: true }

  /api/teams/{team}/approvals:
    get:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - name: team
          in: query
          schema: { type: string }
        - name: open
          in: query
          schema: { type: boolean }
        - name: approved
          in: query
          schema: { type: boolean }
        - name: size
          in: query
          schema: { type: number, minimum: 1 }
        - name: from
          in: query
          schema: { type: number, minimum: 0 }
        - name: updateOrder
          in: query
          schema: { type: string }
        - name: ratingOrder
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalListItem"

  /api/teams/{team}/approvals/{game}:
    parameters:
      - $ref: "#/components/parameters/TeamSlug"
      - $ref: "#/components/parameters/GameSlug"
    get:
      tags: [approvals]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalWithEvents"
    post:
      tags: [approvals]
      summary: Create or submit approval (contract, versions)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalSubmitBody"
      responses:
        "200":
          description: OK
    patch:
      tags: [approvals]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [version, type]
              properties:
                version: { type: number, minimum: 0 }
                type:
                  $ref: "#/components/schemas/VersionKind"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/comment:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
                assets:
                  type: array
                  items: { type: string, format: uuid }
              required: [assets]
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/private:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
                assets:
                  type: array
                  items: { type: string, format: uuid }
              required: [assets]
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/action:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [operator, version, type]
              properties:
                operator: { type: string }
                version: { type: number, minimum: 0 }
                type:
                  $ref: "#/components/schemas/VersionKind"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/active:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [operator, version, type]
              properties:
                operator: { type: string }
                version: { type: number, minimum: 0 }
                type:
                  $ref: "#/components/schemas/VersionKind"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/status:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [open]
              properties:
                comment: { type: string }
                assets:
                  type: array
                  items: { type: string, format: uuid }
                open: { type: boolean }
                locked: { type: boolean }
                guideline: { type: number, minimum: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/guideline:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [guideline, enabled]
              properties:
                guideline: { type: number, minimum: 0 }
                enabled: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/rating:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: number, minimum: 0, maximum: 1000 }
                forceRating: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/update:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [column]
              properties:
                column:
                  type: string
                  enum: [new, awaiting, responded, unset]
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/events/{eventId}:
    patch:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [comment, private_comment]
                comment: { type: string }
                assets:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/assigned-approver:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [add, remove]
                user_id: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/resubmission:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/request-rerating:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/approvals/{game}/events/{eventId}/feedback:
    post:
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
        - name: eventId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: number, minimum: 0, maximum: 1000 }
                comment: { type: string }
                tags:
                  type: array
                  items: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                nullable: true

  /api/teams/{team}/guidelines:
    get:
      tags: [guidelines]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuidelineNode"

  /api/teams/{team}/games/{game}/data/summary/v{version}:
    get:
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
        - name: version
          in: path
          required: true
          schema: { type: number }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                nullable: true
                items:
                  $ref: "#/components/schemas/GameDataSummaryRow"

  /api/teams/{team}/games/{game}/data/distribution/v{version}:
    get:
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
        - $ref: "#/components/parameters/GameSlug"
        - name: version
          in: path
          required: true
          schema: { type: number }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameDistributionRow"

  /api/teams/{team}/payments:
    get:
      tags: [payments, teams]
      parameters:
        - $ref: "#/components/parameters/TeamSlug"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamPaymentsResponse"

  /api/teamRanking:
    get:
      tags: [rankings]
      parameters:
        - name: size
          in: query
          schema: { type: number }
        - name: sort
          in: query
          schema:
            type: string
            enum: [turnover, betcount]
        - name: time
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamRankingRow"

  /api/gameRanking:
    get:
      tags: [rankings]
      parameters:
        - name: size
          in: query
          schema: { type: number }
        - name: sort
          in: query
          schema:
            type: string
            enum: [turnover, betcount]
        - name: time
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameRankingRow"

  /api/contracts/latest:
    get:
      tags: [contracts]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
