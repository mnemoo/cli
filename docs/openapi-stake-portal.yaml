components:
  parameters:
    TeamSlug:
      name: team
      in: path
      required: true
      schema: { type: string }
    GameSlug:
      name: game
      in: path
      required: true
      schema: { type: string }
    ProviderAccountID:
      name: providerAccountID
      in: path
      required: true
      schema: { type: string }

  schemas:
    InviteStatus:
      type: string
      enum: [pending, accepted, declined, cancelled]

    VersionKind:
      type: string
      enum: [math, front]

    UserProfile:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        image: { type: string }
        roles:
          type: array
          items: { type: string }

    UserAccountsResponse:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        accounts:
          type: array
          items:
            type: object
            properties:
              expiresAt: { type: string }
              provider: { type: string }
              providerId: { type: string }
              providerType: { type: string }
              userId: { type: string }

    TeamListItem:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string, nullable: true }
        trustLevel: { type: number }
        stats:
          type: object
          nullable: true
          properties:
            day:
              type: object
              properties:
                count: { type: number }
                turnover: { type: number }
                profit: { type: number }
            month:
              type: object
              properties:
                count: { type: number }
                turnover: { type: number }
                profit: { type: number }

    TeamDetail:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string, nullable: true }
        trustLevel: { type: number }

    TeamPatchBody:
      type: object
      properties:
        name: { type: string, nullable: true }
        slug: { type: string, nullable: true }
        image: { type: string, nullable: true }

    TeamGameStatRow:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string }
        stats:
          type: object
          nullable: true
          properties:
            count: { type: number }
            turnover: { type: number }
            profit: { type: number }
            unique: { type: number }

    TeamOperatorStatRow:
      type: object
      properties:
        betCount: { type: number }
        turnover: { type: number }
        profit: { type: number }
        uniqueUsers: { type: number }
        operator: { type: string }

    GameStatsByModeResponse:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string }
        stats:
          type: array
          items:
            type: object
            properties:
              mode: { type: string }
              count: { type: number }
              turnover: { type: number }
              profit: { type: number }
              expectedReturn: { type: number }
              effectiveRtp: { type: number }
              normalizedRtp: { type: number }
              cost: { type: number }
              rtp: { type: number }

    LocationStatsResponse:
      type: object
      properties:
        currency:
          type: array
          items:
            type: object
            properties:
              currency: { type: string }
              betCount: { type: number }
              turnover: { type: number }
              profit: { type: number }
        country:
          type: array
          items:
            type: object
            properties:
              country: { type: string }
              betCount: { type: number }
              turnover: { type: number }
              profit: { type: number }

    TeamInvite:
      type: object
      properties:
        id: { type: string }
        team:
          type: object
          properties:
            name: { type: string }
            slug: { type: string }
            image: { type: string, nullable: true }
        invitedBy:
          type: object
          properties:
            name: { type: string }
            email: { type: string }
            image: { type: string }
            role:
              type: array
              items: { type: string }
        role:
          type: array
          items: { type: string }
        status:
          oneOf:
            - type: array
              items: { type: string }
            - $ref: "#/components/schemas/InviteStatus"
        invited: { type: string }

    InviteActionResponse:
      type: object
      properties:
        inviteID: { type: string }
        status:
          $ref: "#/components/schemas/InviteStatus"

    Operator:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string, format: uuid }
        demo: { type: boolean }
        social: { type: boolean }
        active: { type: boolean }

    TeamGameCard:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        rating: { type: number, nullable: true }
        image: { type: string, nullable: true }
        published: { type: boolean }
        approval:
          type: object
          nullable: true
          properties:
            open: { type: boolean }
            locked: { type: boolean }
            column: { type: string }
        stats:
          type: object
          nullable: true

    GameCreateResponse:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string, nullable: true }

    TeamGameDetail:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        image: { type: string, nullable: true }
        rating: { type: number, nullable: true }
        approval:
          type: object
          nullable: true
          properties:
            open: { type: boolean }
            locked: { type: boolean }
            column: { type: string }

    GameVersionHistoryItem:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/VersionKind"
        created: { type: number }
        version: { type: number }
        approved:
          type: array
          items:
            type: object
            properties:
              slug: { type: string }
              active: { type: boolean }

    TeamMember:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        image: { type: string }
        joined: { type: number }
        role:
          type: array
          items: { type: string }

    WalletRecord:
      type: object
      properties:
        id: { type: string }
        author:
          type: object
          properties:
            name: { type: string }
            email: { type: string }
            image: { type: string }
            roles:
              type: array
              items: { type: string }
        walletAddr: { type: string }
        walletType: { type: string }
        teamAddr: { type: string }
        activeAt: { type: string }

    ApprovalListItem:
      type: object
      description: Simplified; full Zod type is Nt with optional events
      additionalProperties: true

    ApprovalWithEvents:
      type: object
      description: Approval plus events (discriminated union in client Zod)
      additionalProperties: true

    ApprovalSubmitBody:
      type: object
      required: [contract, mathVersion, frontVersion]
      properties:
        contract: { type: string, format: uuid }
        mathVersion: { type: number, minimum: 0 }
        frontVersion: { type: number, minimum: 0 }
        comment: { type: string }
        assets:
          type: array
          items: { type: string, format: uuid }

    GuidelineNode:
      type: object
      properties:
        id: { type: number }
        parentId: { type: number, nullable: true }
        text: { type: string }
        sortOrder: { type: integer, minimum: 0 }
        type:
          type: string
          enum: [group, item]
        minTrustLevel: { type: number, nullable: true }
        maxTrustLevel: { type: number, nullable: true }
        children:
          type: array
          items:
            $ref: "#/components/schemas/GuidelineNode"

    GameDataSummaryRow:
      type: object
      properties:
        modeName: { type: string }
        modeCost: { type: number }
        rtp: { type: number }
        averageWin: { type: number }
        numModeSimulations: { type: number }
        numNonZeroPayouts: { type: number }
        numNonZeroWeightPayouts: { type: number }
        uniquePayouts: { type: number }
        mostProbablePayout: { type: number }
        minimumWin: { type: number }
        maximumWin: { type: number }
        maxWinHitRate: { type: number }
        nonZeroWinHitRate: { type: number }
        probOfZeroWin: { type: number }
        probOfPayoutLessThanBet: { type: number }
        standardDeviation: { type: number }

    GameDistributionRow:
      type: object
      properties:
        gameMode: { type: string }
        hitRates:
          type: object
          properties:
            ranges:
              type: array
              items:
                type: array
                items: { type: number }
                minItems: 2
                maxItems: 2
            rangeValues:
              type: array
              items: { type: number }
        hitRateCounts:
          type: object
          properties:
            ranges:
              type: array
              items:
                type: array
                items: { type: number }
            rangeCounts:
              type: array
              items: { type: number }

    TeamPaymentsResponse:
      type: object
      properties:
        team:
          type: object
          properties:
            name: { type: string }
            slug: { type: string }
            image: { type: string, nullable: true }
        paymentDetails:
          type: array
          items:
            type: object
            properties:
              wallet:
                type: object
                nullable: true
                properties:
                  address: { type: string }
                  type: { type: string }
              monthProfit: { type: number }
              payment: { type: number }
              previousCarry: { type: number }
              currentStanding: { type: number }
              year: { type: number }
              month: { type: number }

    TeamRankingRow:
      type: object
      properties:
        image: { type: string, nullable: true }
        name: { type: string }
        turnover: { type: number }
        betCount: { type: number }

    GameRankingRow:
      type: object
      properties:
